<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Classification Model</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        heading: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f6f6f6',
                            100: '#e7e7e7',
                            200: '#d1d1d1',
                            300: '#b0b0b0',
                            400: '#888888',
                            500: '#6d6d6d',
                            600: '#5d5d5d',
                            700: '#4f4f4f',
                            800: '#454545',
                            900: '#3d3d3d',
                            950: '#000000',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #050505; /* Deep rich black */
            color: #f6f6f6;
            overflow-x: hidden;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #3d3d3d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5d5d5d;
        }
    </style>
</head>
<body class="antialiased font-sans bg-[#050505] text-brand-50 relative selection:bg-brand-800 selection:text-white">

    <!-- Preloader -->
    <div id="preloader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#050505]">
        <div class="overflow-hidden">
            <h1 class="font-heading text-4xl md:text-6xl font-bold tracking-tighter text-white">Loading Model...</h1>
        </div>
        <div class="w-48 h-[2px] bg-brand-900 mt-6 overflow-hidden">
            <div id="preloader-bar" class="h-full bg-white w-0"></div>
        </div>
    </div>

    <!-- Main Content Wrapper -->
    <main id="main-content" class="min-h-screen opacity-0 invisible">
        <div class="container mx-auto px-6 py-20 flex flex-col items-center justify-center min-h-screen text-center">
            
            <h1 class="font-heading text-4xl md:text-6xl font-bold mb-4 tracking-tight">Garbage Classification</h1>
            <p class="text-brand-300 max-w-xl mx-auto mb-12">Phase 1 Setup: Tailwind, GSAP, and Fonts are ready. The predictor below is unstyled pending Phase 2.</p>

            <!-- Raw Predictor Elements (Unstyled for now, IDs kept intact) -->
            <div>
                <input type="file" id="imageInput" accept="image/*">
                <button onclick="predictImage()" class="mt-4 px-4 py-2 bg-brand-800 text-white rounded">Predict</button>
                <img id="preview" style="display:none; max-width: 300px; margin-top: 20px;">
                <div id="result" class="mt-6 text-left"></div>
            </div>

        </div>
    </main>

    <!-- GSAP (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- UI Animations Script -->
    <script>
        gsap.registerPlugin(ScrollTrigger);

        window.addEventListener("load", () => {
            const tl = gsap.timeline();

            tl.to("#preloader-bar", {
                width: "100%",
                duration: 1.2,
                ease: "power2.inOut"
            })
            .to("#preloader", {
                y: "-100%",
                duration: 0.8,
                ease: "power3.inOut",
                delay: 0.2
            })
            .to("#main-content", {
                autoAlpha: 1, 
                duration: 0.1
            }, "-=0.8")
            .from("#main-content > div > *", {
                y: 30,
                opacity: 0,
                duration: 0.8,
                stagger: 0.1,
                ease: "power3.out"
            }, "-=0.4");
        });
    </script>

    <!-- Original API Logic -->
    <script>
        const API_URL = "https://garbage-classifier-be.onrender.com/predict";
        const imageInput = document.getElementById("imageInput");
        const preview = document.getElementById("preview");

        imageInput.addEventListener("change", function() {
            const file = imageInput.files[0];
            if (!file) return;
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        });

        async function predictImage() {
            const file = imageInput.files[0];
            if (!file) {
                alert("Please choose an image.");
                return;
            }

            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "<p style='color: #888;'>Predicting...</p>";
            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                let probabilitiesHtml = "";
                for (const key in data.probabilities) {
                    probabilitiesHtml += `
                        <tr>
                            <td style="padding: 4px 8px; border: 1px solid #333;">${key}</td>
                            <td style="padding: 4px 8px; border: 1px solid #333;">${data.probabilities[key]}%</td>
                        </tr>
                    `;
                }

                resultDiv.innerHTML = `
                    <h2 style="color: #fff; margin-bottom: 8px;">Prediction: ${data.label}</h2>
                    <p style="color: #b0b0b0; margin-bottom: 16px;">Confidence: ${data.confidence}%</p>
                    <table style="border-collapse: collapse; width: 100%;">
                        <thead>
                            <tr>
                                <th style="padding: 4px 8px; border: 1px solid #333; background: #111; text-align: left;">Class</th>
                                <th style="padding: 4px 8px; border: 1px solid #333; background: #111; text-align: left;">Probability</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${probabilitiesHtml}
                        </tbody>
                    </table>
                `;
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "<p style='color:red;'>Failed to connect to API.</p>";
            }
        }
    </script>
</body>
</html>
