<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Classification Model</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        heading: ['Space Grotesk', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f6f6f6',
                            100: '#e7e7e7',
                            200: '#d1d1d1',
                            300: '#b0b0b0',
                            400: '#888888',
                            500: '#6d6d6d',
                            600: '#5d5d5d',
                            700: '#4f4f4f',
                            800: '#454545',
                            900: '#3d3d3d',
                            950: '#000000',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <style>
        body {
            background-color: #050505; /* Deep rich black */
            color: #f6f6f6;
            overflow-x: hidden;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #3d3d3d;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5d5d5d;
        }
    </style>
</head>
<body class="antialiased font-sans bg-[#050505] text-brand-50 relative selection:bg-brand-800 selection:text-white">

    <!-- Preloader -->
    <div id="preloader" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#050505]">
        <div class="overflow-hidden">
            <h1 class="font-heading text-4xl md:text-6xl font-bold tracking-tighter text-white">Memuat Model...</h1>
        </div>
        <div class="w-48 h-[2px] bg-brand-900 mt-6 overflow-hidden">
            <div id="preloader-bar" class="h-full bg-white w-0"></div>
        </div>
    </div>

    <!-- Main Content Wrapper -->
    <main id="main-content" class="min-h-screen opacity-0 invisible">
        <div class="container mx-auto px-6 pt-32 pb-20 flex flex-col items-center min-h-screen text-center">
            
            <!-- Hero Section -->
            <div class="max-w-3xl mx-auto mb-16">
                <div class="inline-block px-4 py-1.5 rounded-full border border-[#333] text-brand-300 text-sm font-medium mb-6">
                    Proyek Arsitektur CNN
                </div>
                <h1 class="font-heading text-5xl md:text-7xl font-bold mb-6 tracking-tight leading-tight">
                    Klasifikasi <br class="hidden md:block" /> Sampah
                </h1>
                <p class="text-brand-300 text-lg max-w-2xl mx-auto">
                    Proyek <i>machine learning</i> berbasis Convolutional Neural Networks (CNN) untuk mengklasifikasikan sampah ke dalam empat kategori: Glass, Metal, Paper, dan Plastic. Unggah gambar untuk menguji model.
                </p>
            </div>

            <!-- Predictor Card -->
            <div class="bg-[#0a0a0a] border border-[#222] p-8 md:p-10 rounded-3xl w-full max-w-md shadow-[0_0_50px_rgba(0,0,0,0.5)] text-left relative overflow-hidden">
                <!-- Decorative background glow -->
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-1/2 bg-white/5 blur-[100px] pointer-events-none"></div>

                <div class="mb-8 relative z-10">
                    <label class="block text-brand-300 text-sm mb-3">Unggah Gambar</label>
                    <input type="file" id="imageInput" accept="image/*" class="block w-full text-sm text-brand-400 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-[#1a1a1a] file:text-white hover:file:bg-[#2a2a2a] file:transition-colors file:cursor-pointer cursor-pointer bg-[#050505] border border-[#222] rounded-full">
                </div>

                <button onclick="predictImage()" class="relative z-10 w-full py-4 bg-white text-black font-semibold rounded-full hover:bg-gray-200 transition duration-300 shadow-[0_0_20px_rgba(255,255,255,0.1)]">
                    Prediksi Sekarang
                </button>

                <div class="relative w-full flex justify-center z-10">
                    <img id="preview" style="display:none;" class="w-full max-h-64 object-contain rounded-2xl mt-8 border border-[#222] bg-[#050505] p-2">
                </div>

                <div id="result" class="mt-8 text-left relative z-10"></div>
            </div>

        </div>
    </main>

    <!-- GSAP (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- UI Animations Script -->
    <script>
        gsap.registerPlugin(ScrollTrigger);

        window.addEventListener("load", () => {
            const tl = gsap.timeline();

            tl.to("#preloader-bar", {
                width: "100%",
                duration: 1.2,
                ease: "power2.inOut"
            })
            .to("#preloader", {
                y: "-100%",
                duration: 0.8,
                ease: "power3.inOut",
                delay: 0.2
            })
            .to("#main-content", {
                autoAlpha: 1, 
                duration: 0.1
            }, "-=0.8")
            .from("#main-content > div > *", {
                y: 30,
                opacity: 0,
                duration: 0.8,
                stagger: 0.1,
                ease: "power3.out"
            }, "-=0.4");
        });
    </script>

    <!-- Original API Logic -->
    <script>
        const API_URL = "https://garbage-classifier-be.onrender.com/predict";
        const imageInput = document.getElementById("imageInput");
        const preview = document.getElementById("preview");

        imageInput.addEventListener("change", function() {
            const file = imageInput.files[0];
            if (!file) return;
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        });

        async function predictImage() {
            const file = imageInput.files[0];
            if (!file) {
                alert("Harap pilih gambar terlebih dahulu.");
                return;
            }

            const resultDiv = document.getElementById("result");
            resultDiv.innerHTML = "<div class='flex items-center justify-center py-4'><div class='w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin mr-3'></div><p class='text-brand-300'>Memproses Prediksi...</p></div>";
            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                
                let probabilitiesHtml = "";
                for (const key in data.probabilities) {
                    probabilitiesHtml += `
                        <tr class="border-b border-[#222] last:border-0 hover:bg-[#0a0a0a] transition-colors">
                            <td class="py-3 px-4 text-brand-200 capitalize">${key}</td>
                            <td class="py-3 px-4 text-white text-right font-medium">${data.probabilities[key]}%</td>
                        </tr>
                    `;
                }

                resultDiv.innerHTML = `
                    <div class="p-6 bg-[#111] rounded-2xl border border-[#222] mb-6 shadow-inner">
                        <p class="text-brand-400 text-sm mb-1 uppercase tracking-wider text-xs">Hasil Prediksi</p>
                        <h2 class="text-3xl font-heading font-bold text-white capitalize tracking-tight">${data.label}</h2>
                        <div class="mt-4 flex items-center gap-3">
                            <div class="h-1.5 w-full bg-[#222] rounded-full overflow-hidden">
                                <div class="h-full bg-white rounded-full transition-all duration-1000 ease-out" style="width: ${data.confidence}%"></div>
                            </div>
                            <span class="text-sm font-medium text-brand-200 whitespace-nowrap">${data.confidence}%</span>
                        </div>
                    </div>
                    
                    <div class="bg-[#050505] rounded-2xl border border-[#222] overflow-hidden">
                        <table class="w-full text-sm text-left">
                            <thead class="text-xs text-brand-400 uppercase bg-[#0a0a0a] border-b border-[#222]">
                                <tr>
                                    <th class="py-3 px-4 font-medium">Kelas</th>
                                    <th class="py-3 px-4 font-medium text-right">Probabilitas</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${probabilitiesHtml}
                            </tbody>
                        </table>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "<p class='text-red-400 bg-red-400/10 p-4 rounded-xl border border-red-400/20 text-sm'>Gagal terhubung ke API. Silakan coba lagi.</p>";
            }
        }
    </script>
</body>
</html>
